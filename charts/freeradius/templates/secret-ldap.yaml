apiVersion: v1
kind: Secret
metadata:
  name: {{ include "freeradius.fullname" . }}-ldap-secret
  labels:
    app.kubernetes.io/name: {{ include "freeradius.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  mods-available-ldap: |
    ldap {
      server = "{{ .Values.ldap.host }}"
      port = {{ .Values.ldap.port }}
      identity = "{{ .Values.ldap.bindDN }}"
      password = "{{ .Values.ldap.password }}"
      base_dn = "{{ .Values.ldap.baseDN }}"
      # search filter for users
      filter = "(uid=%{User-Name})"
      start_tls = no
      tls_require_cert = 'never'
      # map LDAP attributes to RADIUS
      groupname_attribute = "cn"
      groupmembership_filter = "(memberUid=%{User-Name})"
    }
