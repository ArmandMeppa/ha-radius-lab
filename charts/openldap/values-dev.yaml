# Environment-specific override values for the dev environment
# Use with: `-f charts/openldap/values-dev.yaml`

persistence:
  enabled: true
  size: 2Gi

openldap:
  adminPassword: "ChangeMe123!"
  baseDN: "dc=example,dc=org"
  replication:
    enabled: false

service:
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
